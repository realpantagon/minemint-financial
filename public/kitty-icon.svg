<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background with Hello Kitty Red (Pure Red) -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF1A43" />
      <stop offset="100%" stop-color="#E60024" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3C4" />
      <stop offset="50%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#CC9900" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#bgGrad)" />
  
  <!-- Outer Gold Border -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="none" stroke="#FFCC00" stroke-width="12" />

  <!-- Center composition: A Gold coin with a beautiful ribbon/bow on top -->
  <g transform="translate(256, 275)">
    <!-- Shadow for Coin -->
    <ellipse cx="0" cy="90" rx="120" ry="25" fill="#800014" opacity="0.4" />
    
    <!-- Gold Coin -->
    <circle cx="0" cy="0" r="110" fill="url(#goldGrad)" stroke="#CC9900" stroke-width="8" />
    <circle cx="0" cy="0" r="85" fill="none" stroke="#FFF3C4" stroke-width="4" stroke-dasharray="12 8" />
    
    <!-- Thai Baht Sign in center of coin -->
    <text x="0" y="38" font-family="'IBM Plex Sans Thai', 'Outfit', sans-serif" font-size="110" font-weight="900" fill="#CC9900" text-anchor="middle" opacity="0.3">฿</text>
    <text x="0" y="35" font-family="'IBM Plex Sans Thai', 'Outfit', sans-serif" font-size="110" font-weight="900" fill="#FFFFFF" text-anchor="middle">฿</text>

    <!-- Red Ribbon / Bow (🎀) on top of the coin -->
    <g transform="translate(0, -110)">
      <!-- Left loop -->
      <path d="M 0,0 C -60,-80 -120,-30 -40,10 C -20,20 0,0 0,0 Z" fill="#E60024" stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round" />
      <!-- Right loop -->
      <path d="M 0,0 C 60,-80 120,-30 40,10 C 20,20 0,0 0,0 Z" fill="#E60024" stroke="#FFFFFF" stroke-width="6" stroke-linejoin="round" />
      <!-- Left ribbon tail -->
      <path d="M -20,5 C -50,40 -70,90 -50,95 C -40,100 -20,60 0,10 Z" fill="#E60024" stroke="#FFFFFF" stroke-width="5" />
      <!-- Right ribbon tail -->
      <path d="M 20,5 C 50,40 70,90 50,95 C 40,100 20,60 0,10 Z" fill="#E60024" stroke="#FFFFFF" stroke-width="5" />
      <!-- Center Knot -->
      <circle cx="0" cy="0" r="24" fill="#FF1A43" stroke="#FFFFFF" stroke-width="6" />
    </g>
  </g>
</svg>
